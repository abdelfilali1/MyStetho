<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Doctivo{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=20260316-13">
    {% block head %}{% endblock %}
</head>
<style>
    html, body { overflow: hidden !important; margin: 0; padding: 0; background: transparent; }
    .odo-header, .view-toggle-bar { display: none !important; }
    .odo-page { padding: 0 !important; }
</style>
<body>
    {% block breadcrumb %}{% endblock %}
    {% block content %}{% endblock %}
    {% block content_full %}{% endblock %}
    {% block scripts %}{% endblock %}
</body>
</html>
