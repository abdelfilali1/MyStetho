{% extends "base.html" %}
{% block title %}Importer un document — MyStetho{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Importer un document</h2>
    <a href="/documents" class="btn btn-outline">Retour</a>
</div>

<div class="card" style="max-width: 600px;">
    <div class="card-body">
        <form method="POST" action="/documents/upload" enctype="multipart/form-data" style="display: flex; flex-direction: column; gap: 16px;">
            <div class="form-group">
                <label>Patient *</label>
                <select name="patient_id" required>
                    <option value="">Sélectionner...</option>
                    {% for p in patients %}
                    <option value="{{ p.id }}" {{ 'selected' if selected_patient_id and selected_patient_id == p.id }}>{{ p.last_name | upper }} {{ p.first_name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>Titre du document *</label>
                <input type="text" name="title" required placeholder="Radio thorax du 14/03/2026">
            </div>
            <div class="form-group">
                <label>Catégorie *</label>
                <select name="category" required>
                    <option value="radio">Radiologie</option>
                    <option value="labo">Laboratoire</option>
                    <option value="courrier">Courrier</option>
                    <option value="compte_rendu">Compte-rendu</option>
                    <option value="ordonnance">Ordonnance</option>
                    <option value="autre">Autre</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <textarea name="description" rows="2" placeholder="Description optionnelle..."></textarea>
            </div>
            <div class="form-group">
                <label>Fichier *</label>
                <input type="file" name="file" required accept=".pdf,.jpg,.jpeg,.png,.gif,.doc,.docx,.dicom">
            </div>
            <button type="submit" class="btn btn-primary">Importer</button>
        </form>
    </div>
</div>
{% endblock %}
