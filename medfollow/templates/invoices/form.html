{% extends "base.html" %}
{% block title %}Nouvelle facture — Doctivo{% endblock %}

{% block content %}
<div class="page-header">
    <h2>Nouvelle facture</h2>
    <a href="/invoices" class="btn btn-outline">Retour</a>
</div>

<form method="POST" action="/invoices/new">
    <div class="detail-grid">
        <div class="card">
            <div class="card-header"><h3>Lignes de facturation</h3></div>
            <div class="card-body">
                <div id="invoice-items">
                    <div class="invoice-item" data-index="0">
                        <div class="form-row">
                            <div class="form-group" style="flex: 2;">
                                <label>Description *</label>
                                <input type="text" name="item_desc_0" required placeholder="Consultation spécialisée">
                            </div>
                            <div class="form-group">
                                <label>Qté</label>
                                <input type="number" name="item_qty_0" value="1" min="1">
                            </div>
                            <div class="form-group">
                                <label>Prix unit. (DH)</label>
                                <input type="number" step="0.01" name="item_price_0" required placeholder="50.00" onchange="calcTotal()">
                            </div>
                        </div>
                        <div class="form-group" style="margin-bottom: 12px;">
                            <label>Acte médical</label>
                            <select name="item_act_id_0" onchange="fillAct(this, 0)">
                                <option value="">— Sélectionner un acte —</option>
                                {% for a in acts %}
                                <option value="{{ a.id }}" data-name="{{ a.name }}" data-price="{{ a.base_price }}">{{ a.code }} — {{ a.name }} ({{ '%.2f' | format(a.base_price) }} DH)</option>
                                {% endfor %}
                            </select>
                        </div>
                        <hr style="border: none; border-top: 1px solid var(--gray-200); margin: 8px 0 16px;">
                    </div>
                </div>
                <button type="button" class="btn btn-outline btn-sm" onclick="addItem()">+ Ajouter une ligne</button>
                <div style="margin-top: 16px; text-align: right; font-size: 18px; font-weight: 700;">
                    Total : <span id="total-display">0.00</span> DH
                </div>
            </div>
        </div>

        <div>
            <div class="card">
                <div class="card-header"><h3>Informations</h3></div>
                <div class="card-body" style="display: flex; flex-direction: column; gap: 12px;">
                    <div class="form-group">
                        <label>Patient *</label>
                        <div style="display:flex;gap:6px;align-items:center;">
                            <select name="patient_id" id="sel-patient-i" required style="flex:1;">
                                <option value="">Sélectionner...</option>
                                {% for p in patients %}
                                <option value="{{ p.id }}" {{ 'selected' if selected_patient_id and selected_patient_id == p.id }}>{{ p.last_name | upper }} {{ p.first_name }}</option>
                                {% endfor %}
                            </select>
                            <a href="/patients/new?next=/invoices/new" class="btn btn-outline btn-sm" title="Créer un nouveau patient">+</a>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Praticien *</label>
                        <select name="doctor_id" required>
                            {% for d in doctors %}
                            <option value="{{ d.id }}" {{ 'selected' if d.id == user.sub }}>Dr. {{ d.last_name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group" style="flex-direction: row; align-items: center; gap: 8px;">
                        <input type="checkbox" id="tiers_payant" name="tiers_payant">
                        <label for="tiers_payant" style="font-weight: normal;">Tiers payant</label>
                    </div>
                    <div class="form-group">
                        <label>Notes</label>
                        <textarea name="notes" rows="3" placeholder="Notes..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary btn-full">Créer la facture</button>
                </div>
            </div>
        </div>
    </div>
</form>
{% endblock %}

{% block scripts %}
<script>
let itemIndex = 1;

function addItem() {
    const list = document.getElementById('invoice-items');
    list.insertAdjacentHTML('beforeend', `
    <div class="invoice-item" data-index="${itemIndex}">
        <div style="display: flex; justify-content: flex-end;">
            <button type="button" class="btn btn-outline btn-sm" onclick="this.closest('.invoice-item').remove(); calcTotal();" style="color: var(--danger);">Supprimer</button>
        </div>
        <div class="form-row">
            <div class="form-group" style="flex: 2;">
                <label>Description *</label>
                <input type="text" name="item_desc_${itemIndex}" required placeholder="Description">
            </div>
            <div class="form-group">
                <label>Qté</label>
                <input type="number" name="item_qty_${itemIndex}" value="1" min="1" onchange="calcTotal()">
            </div>
            <div class="form-group">
                <label>Prix unit. (DH)</label>
                <input type="number" step="0.01" name="item_price_${itemIndex}" required placeholder="0.00" onchange="calcTotal()">
            </div>
        </div>
        <div class="form-group" style="margin-bottom: 12px;">
            <label>Acte médical</label>
            <select name="item_act_id_${itemIndex}" onchange="fillAct(this, ${itemIndex})">
                <option value="">— Sélectionner un acte —</option>
                {% for a in acts %}
                <option value="{{ a.id }}" data-name="{{ a.name }}" data-price="{{ a.base_price }}">{{ a.code }} — {{ a.name }} ({{ '%.2f' | format(a.base_price) }} DH)</option>
                {% endfor %}
            </select>
        </div>
        <hr style="border: none; border-top: 1px solid var(--gray-200); margin: 8px 0 16px;">
    </div>`);
    itemIndex++;
}

function fillAct(sel, idx) {
    const opt = sel.options[sel.selectedIndex];
    if (opt.value) {
        document.querySelector(`[name="item_desc_${idx}"]`).value = opt.dataset.name;
        document.querySelector(`[name="item_price_${idx}"]`).value = parseFloat(opt.dataset.price).toFixed(2);
        calcTotal();
    }
}

function calcTotal() {
    let total = 0;
    document.querySelectorAll('.invoice-item').forEach(item => {
        const idx = item.dataset.index;
        const qty = parseFloat(document.querySelector(`[name="item_qty_${idx}"]`).value || 1);
        const price = parseFloat(document.querySelector(`[name="item_price_${idx}"]`).value || 0);
        total += qty * price;
    });
    document.getElementById('total-display').textContent = total.toFixed(2);
}
</script>
{% endblock %}
