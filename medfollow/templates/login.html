{% extends "base.html" %}
{% block title %}Connexion - Doctivo{% endblock %}

{% block content_full %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="brand brand-auth" style="flex-direction:column;align-items:center;gap:10px;">
                <img src="/static/img/logo4.png" alt="Logo Doctivo" class="brand-logo">
                <p class="brand-tag" style="text-align:center;font-size:14px;">La santé, mieux organisée</p>
            </div>
            <p>Connectez-vous à votre espace</p>
        </div>
        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login" class="auth-form" id="login-form">
            <div class="form-group">
                <label for="email">Email <span class="required-star">*</span></label>
                <input type="email" id="email" name="email" required autofocus placeholder="docteur@cabinet.fr" aria-required="true">
            </div>
            <div class="form-group">
                <label for="password">Mot de passe <span class="required-star">*</span></label>
                <input type="password" id="password" name="password" required placeholder="********" aria-required="true">
            </div>
            <button type="submit" class="btn btn-primary btn-full">Se connecter</button>
        </form>
        <p class="auth-alt-link">
            Premiere installation ? <a href="/setup">Creer le compte administrateur</a>
        </p>
    </div>
</div>
{% endblock %}
